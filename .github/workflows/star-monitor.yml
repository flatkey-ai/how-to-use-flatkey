name: Star Monitor

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update stars.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: flatkey-ai/how-to-use-flatkey
        run: |
          node <<'NODE'
          const fs = require("fs");

          const repository = process.env.REPOSITORY;
          const token = process.env.GITHUB_TOKEN;
          const today = new Date().toISOString().slice(0, 10);

          async function main() {
            const response = await fetch(`https://api.github.com/repos/${repository}`, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });

            if (!response.ok) {
              throw new Error(`GitHub API failed: ${response.status} ${await response.text()}`);
            }

            const repo = await response.json();
            const stars = repo.stargazers_count;
            const path = "stars.json";
            const current = fs.existsSync(path)
              ? JSON.parse(fs.readFileSync(path, "utf8"))
              : { repository, history: [] };

            const history = Array.isArray(current.history) ? current.history : [];
            const withoutToday = history.filter((entry) => entry.date !== today);
            const next = {
              repository,
              latest: { date: today, stars },
              history: [...withoutToday, { date: today, stars }],
            };

            fs.writeFileSync(path, `${JSON.stringify(next, null, 2)}\n`);
          }

          main();
          NODE

      - name: Commit star count
        run: |
          if git diff --quiet -- stars.json; then
            echo "stars.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stars.json
          git commit -m "chore: update star count"
          git push
